name: Documentation issue
description: Report missing, stale, or confusing documentation.
title: "[docs]: "
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: "README.md, docs/oficial.md, GitHub Pages section..."
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested update
