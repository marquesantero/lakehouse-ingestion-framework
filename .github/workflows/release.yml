name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.13.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check release metadata
        run: python scripts/check_release.py

      - name: Check release tag
        run: python scripts/check_release_tag.py "${{ steps.release_tag.outputs.tag }}"

      - name: Install build tools
        run: python -m pip install build twine

      - name: Build distributions
        env:
          SOURCE_DATE_EPOCH: "1778457600"
        run: python -m build

      - name: Check distributions
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contractforge-dist-${{ steps.release_tag.outputs.tag }}
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ContractForge ${{ steps.release_tag.outputs.tag }}
          body: |
            Automated ContractForge release.

            Validation performed:
            - `python scripts/check_release.py`
            - `python scripts/check_release_tag.py ${{ steps.release_tag.outputs.tag }}`
            - `python -m build`
            - `twine check dist/*`
          files: dist/*
